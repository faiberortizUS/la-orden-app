<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0A0A0F" />
  <title>La Orden — El 1%</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=21" />
</head>
<body>

  <!-- ─── SPLASH SCREEN ─────────────────────────────── -->
  <div id="splash" class="splash">
    <div class="splash__symbol">🏛️</div>
    <div class="splash__title">LA ORDEN</div>
    <div class="splash__sub">El 1%</div>
    <div class="splash__loader"><span></span></div>
  </div>

  <!-- ─── APP SHELL ───────────────────────────────────── -->
  <div id="app" class="app hidden">

    <!-- HEADER -->
    <header class="header" id="header">
      <div class="header__left tappable" onclick="navigateTo('command_center')">
        <span class="header__symbol">🏛️</span>
        <span class="header__title">La Orden</span>
      </div>
      <div class="header__right">
        <div class="header__rank tappable" id="headerRank" onclick="if(typeof showInteractiveModal==='function') showInteractiveModal('Escala de Dominio Jerárquico', 'Tu rango impone a la Célula cuánto peso y Puntos de Poder (PC) has acumulado triturando la debilidad.<br><br><b>🌱 Aspirante</b> — Punto de partida.<br><b>⚔️ Iniciado</b> — Acceso al sistema.<br><b>🛡️ Comprometido</b> — ICD ≥60 · 7 días.<br><b>🔱 Disciplinado</b> — ICD ≥70 · 14 días.<br><b>💎 Consistente</b> — ICD ≥80 · 30 días · 1 contrato.<br><b>🏛️ Arquitecto</b> — ICD ≥85 · 60 días · 2 contratos.<br><b>👁️ Custodio</b> — ICD ≥90 · 90 días · 3 contratos.<br><br>⚠️ Sin acción diaria el rango cae. El ICD que construiste hoy, lo pierdes mañana si no reportas.', '🏛️')">⚔️ Iniciado</div>
      </div>
    </header>

    <!-- VIEW CONTAINER -->
    <main class="main" id="viewContainer">
      <!-- Views are injected here by JS -->
    </main>

    <!-- BOTTOM NAV (6 tabs) -->
    <nav class="bottom-nav" id="bottomNav">
      <button class="nav-item active" data-view="home" onclick="navigateTo('home')">
        <span class="nav-icon">🏠</span>
        <span class="nav-label">Inicio</span>
      </button>
      <button class="nav-item" data-view="report" onclick="navigateTo('report')">
        <span class="nav-icon">⚡</span>
        <span class="nav-label">Reportar</span>
      </button>
      <button class="nav-item" data-view="stats" onclick="navigateTo('stats')">
        <span class="nav-icon">📊</span>
        <span class="nav-label">Métricas</span>
      </button>
      <button class="nav-item" data-view="oath" onclick="navigateTo('oath')">
        <span class="nav-icon">📜</span>
        <span class="nav-label">Pacto</span>
      </button>
      <button class="nav-item" data-view="celula" onclick="navigateTo('celula')">
        <span class="nav-icon">⚔️</span>
        <span class="nav-label">Célula</span>
      </button>
      <button class="nav-item" data-view="command_center" onclick="navigateTo('command_center')">
        <span class="nav-icon">🗺️</span>
        <span class="nav-label">Mapa</span>
      </button>
    </nav>

  </div>

  <!-- CONFETTI CANVAS -->
  <canvas id="confettiCanvas" class="confetti-canvas"></canvas>

  <!-- SCRIPTS — ordenados por dependencias -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <!-- API primero -->
  <script src="js/api.js?v=31"></script>

  <!-- Vistas del dashboard -->
  <script src="js/views/home.js?v=32"></script>
  <script src="js/views/report.js?v=32"></script>
  <script src="js/views/stats.js?v=32"></script>
  <script src="js/views/compare.js?v=32"></script>
  <script src="js/views/oath.js?v=32"></script>
  <script src="js/views/celula.js?v=32"></script>
  <script src="js/tut_images.js?v=2"></script>
  <script src="js/views/tutorial.js?v=32"></script>
  <script src="js/views/add_habit.js?v=32"></script>

  <!-- Centro de Comandos -->
  <script src="js/command_center.js?v=32"></script>

  <!-- Onboarding (orquestador primero, luego pantallas) -->
  <script src="js/onboarding.js?v=32"></script>
  <script src="js/onboarding_welcome.js?v=32"></script>
  <script src="js/onboarding_commitments.js?v=32"></script>
  <script src="js/onboarding_oath.js?v=32"></script>
  <script src="js/onboarding_initiation.js?v=32"></script>
  <script src="js/onboarding_payment.js?v=32"></script>

  <!-- Panel bloqueado con neuromarketing (usuarios sin pago) -->
  <script src="js/locked_dashboard.js?v=32"></script>

  <!-- App principal (al final, usa todo lo anterior) -->
  <script src="js/app.js?v=32"></script>
</body>
</html>
